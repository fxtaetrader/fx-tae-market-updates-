<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRADIENT TRADINGVIEW · PREMIUM</title>
    <!-- Lightweight Charts Library -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <!-- Technical Indicators Library -->
    <script src="https://cdn.jsdelivr.net/npm/technicalindicators@3.1.0/dist/technicalindicators.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- html2canvas for export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f35 50%, #0f1a2f 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: #fff;
            position: fixed;
        }

        /* main container - full screen */
        .tradingview-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* ========== TOP NAVIGATION BAR ========== */
        .top-nav {
            background: linear-gradient(90deg, rgba(20, 30, 50, 0.95), rgba(30, 20, 60, 0.95));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid;
            border-image: linear-gradient(90deg, #ff6ec4, #7873f5, #3b9eff) 1;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            -webkit-app-region: drag;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gradient-logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ff6ec4, #7873f5, #3b9eff, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .symbol-selector {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #4d7cb0;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        /* ========== MAIN LAYOUT ========== */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            height: calc(100vh - 60px);
        }

        /* ========== LEFT SIDEBAR (INSTRUMENTS) ========== */
        .left-sidebar {
            width: 60px;
            background: linear-gradient(180deg, #0c1425, #131b30);
            border-right: 1px solid;
            border-image: linear-gradient(180deg, #ff6ec4, #7873f5) 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 25px;
        }

        .sidebar-icon {
            font-size: 1.5rem;
            color: #8aa5d0;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .sidebar-icon:hover {
            color: white;
            text-shadow: 0 0 15px #3b9eff;
            transform: scale(1.2);
        }

        .sidebar-icon.active {
            color: #ffd966;
            text-shadow: 0 0 20px #ffaa00;
        }

        /* ========== CENTER CHART AREA ========== */
        .chart-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
        }

        /* chart toolbar */
        .chart-toolbar {
            background: linear-gradient(90deg, #141e30, #1a1f35);
            padding: 8px 16px;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #3a4f70;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-group {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 4px;
            border-radius: 40px;
            border: 1px solid #3a5f8a;
        }

        .tool-btn {
            background: transparent;
            border: none;
            color: #b0c8f0;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .tool-btn:hover {
            background: rgba(100, 150, 255, 0.3);
            color: white;
        }

        .tool-btn.active {
            background: linear-gradient(135deg, #2a4a8a, #1a3a6a);
            color: white;
            box-shadow: 0 0 15px #3b9eff;
        }

        /* chart container */
        .chart-wrapper {
            flex: 1;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }

        #mainChart {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            background: #050b14;
            box-shadow: 0 0 50px rgba(0,0,0,0.8) inset;
        }

        /* ========== RIGHT SIDEBAR (DATA/WATCHLIST) ========== */
        .right-sidebar {
            width: 320px;
            background: linear-gradient(135deg, #0f1a2a, #1a1f35);
            border-left: 1px solid;
            border-image: linear-gradient(180deg, #7873f5, #ff6ec4) 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* watchlist */
        .watchlist-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1rem;
            color: #b0c8f0;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .watchlist-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid #3a5a80;
            border-radius: 30px;
            padding: 12px 18px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }

        .watchlist-item:hover {
            background: rgba(60, 100, 200, 0.2);
            border-color: #6a9eff;
        }

        /* indicators panel */
        .indicators-panel {
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .indicator-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
        }

        .indicator-item:hover {
            background: rgba(100,150,255,0.2);
        }

        .indicator-color {
            width: 20px;
            height: 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, #ff6ec4, #7873f5);
        }

        /* order book */
        .order-book {
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 15px;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-family: monospace;
        }

        .bid { color: #4ade80; }
        .ask { color: #ff6b6b; }

        /* ========== BOTTOM PANEL ========== */
        .bottom-panel {
            background: linear-gradient(90deg, #0c1425, #131b30);
            border-top: 1px solid;
            border-image: linear-gradient(90deg, #3b9eff, #ff6ec4) 1;
            height: 200px;
            display: flex;
        }

        .panel-tabs {
            width: 150px;
            border-right: 1px solid #3a4f70;
            padding: 10px;
        }

        .panel-tab {
            padding: 10px;
            border-radius: 20px;
            margin-bottom: 5px;
            cursor: pointer;
        }

        .panel-tab.active {
            background: linear-gradient(90deg, #2a4a8a, #1a3a6a);
        }

        .panel-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        /* drawings library */
        .drawing-item {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 8px;
            margin: 5px;
            display: inline-block;
        }

        /* gradient scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1f35;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #ff6ec4, #7873f5);
            border-radius: 10px;
        }

        /* modal for alerts */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1f35, #0a0f1e);
            border: 2px solid;
            border-image: linear-gradient(45deg, #ff6ec4, #3b9eff) 1;
            border-radius: 40px;
            padding: 30px;
            z-index: 1000;
            min-width: 300px;
        }

        .modal.active {
            display: block;
        }

        .modal input, .modal select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0a0f1e;
            border: 1px solid #3b9eff;
            border-radius: 30px;
            color: white;
        }
    </style>
</head>
<body>
<div class="tradingview-container">
    <!-- TOP NAVIGATION -->
    <div class="top-nav">
        <div class="logo-area">
            <span class="gradient-logo">📊 GRADIENT VIEW</span>
        </div>
        <div class="symbol-selector" onclick="showSymbolSearch()">
            <span id="currentSymbol">XAUUSD</span> <i class="fa-solid fa-chevron-down"></i>
        </div>
        <div style="flex:1"></div>
        <div class="toolbar-group">
            <button class="tool-btn" onclick="saveLayout()"><i class="fa-regular fa-floppy-disk"></i> Save</button>
            <button class="tool-btn" onclick="loadLayout()"><i class="fa-regular fa-folder-open"></i> Load</button>
            <button class="tool-btn" onclick="exportChart()"><i class="fa-regular fa-image"></i> Export</button>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">
        <!-- LEFT SIDEBAR -->
        <div class="left-sidebar">
            <div class="sidebar-icon active" title="Charts"><i class="fa-solid fa-chart-line"></i></div>
            <div class="sidebar-icon" title="Watchlist"><i class="fa-solid fa-star"></i></div>
            <div class="sidebar-icon" title="Indicators"><i class="fa-solid fa-chart-simple"></i></div>
            <div class="sidebar-icon" title="Drawings"><i class="fa-regular fa-pen-to-square"></i></div>
            <div class="sidebar-icon" title="Alerts"><i class="fa-regular fa-bell"></i></div>
            <div class="sidebar-icon" title="Replay"><i class="fa-solid fa-clock-rotate-left"></i></div>
            <div class="sidebar-icon" title="Settings"><i class="fa-solid fa-gear"></i></div>
        </div>

        <!-- CENTER CHART AREA -->
        <div class="chart-area">
            <div class="chart-toolbar">
                <div class="toolbar-group">
                    <button class="tool-btn" onclick="changeInterval('1')">1m</button>
                    <button class="tool-btn" onclick="changeInterval('5')">5m</button>
                    <button class="tool-btn active" onclick="changeInterval('15')">15m</button>
                    <button class="tool-btn" onclick="changeInterval('60')">1h</button>
                    <button class="tool-btn" onclick="changeInterval('240')">4h</button>
                    <button class="tool-btn" onclick="changeInterval('D')">1D</button>
                    <button class="tool-btn" onclick="changeInterval('W')">1W</button>
                </div>
                
                <div class="toolbar-group">
                    <button class="tool-btn" onclick="setChartType('candle')"><i class="fa-regular fa-candle"></i></button>
                    <button class="tool-btn" onclick="setChartType('line')"><i class="fa-solid fa-chart-line"></i></button>
                    <button class="tool-btn" onclick="setChartType('area')"><i class="fa-solid fa-chart-area"></i></button>
                    <button class="tool-btn" onclick="setChartType('bar')"><i class="fa-solid fa-chart-bar"></i></button>
                </div>

                <div class="toolbar-group">
                    <button class="tool-btn" onclick="toggleIndicator('rsi')">RSI</button>
                    <button class="tool-btn" onclick="toggleIndicator('macd')">MACD</button>
                    <button class="tool-btn" onclick="toggleIndicator('ma')">MA</button>
                    <button class="tool-btn" onclick="toggleIndicator('bb')">Boll</button>
                </div>
            </div>

            <div class="chart-wrapper">
                <div id="mainChart"></div>
            </div>
        </div>

        <!-- RIGHT SIDEBAR -->
        <div class="right-sidebar">
            <div class="watchlist-section">
                <div class="section-title">
                    <span>WATCHLIST</span>
                    <i class="fa-solid fa-plus" onclick="addToWatchlist()"></i>
                </div>
                <div id="watchlist">
                    <div class="watchlist-item" onclick="changeSymbol('XAUUSD')">
                        <span>XAUUSD</span>
                        <span class="positive" id="xau-price">2,342.50</span>
                    </div>
                    <div class="watchlist-item" onclick="changeSymbol('BTCUSD')">
                        <span>BTCUSD</span>
                        <span class="positive" id="btc-price">67,250</span>
                    </div>
                    <div class="watchlist-item" onclick="changeSymbol('ETHUSD')">
                        <span>ETHUSD</span>
                        <span class="negative">3,421</span>
                    </div>
                    <div class="watchlist-item" onclick="changeSymbol('AAPL')">
                        <span>AAPL</span>
                        <span class="positive">175.34</span>
                    </div>
                </div>
            </div>

            <div class="indicators-panel">
                <div class="section-title">ACTIVE INDICATORS</div>
                <div id="activeIndicators">
                    <!-- will be populated by JS -->
                </div>
            </div>

            <div class="order-book">
                <div class="section-title">ORDER BOOK</div>
                <div class="order-row"><span class="bid">BID 2342.5 (12)</span><span class="ask">ASK 2343.2 (8)</span></div>
                <div class="order-row"><span class="bid">2342.0 (23)</span><span class="ask">2343.8 (15)</span></div>
                <div class="order-row"><span class="bid">2341.4 (31)</span><span class="ask">2344.3 (9)</span></div>
                <div class="order-row"><span class="bid">2340.9 (17)</span><span class="ask">2344.9 (22)</span></div>
            </div>
        </div>
    </div>

    <!-- BOTTOM PANEL -->
    <div class="bottom-panel">
        <div class="panel-tabs">
            <div class="panel-tab active" onclick="switchPanel('drawings')">DRAWINGS</div>
            <div class="panel-tab" onclick="switchPanel('alerts')">ALERTS</div>
            <div class="panel-tab" onclick="switchPanel('news')">NEWS</div>
            <div class="panel-tab" onclick="switchPanel('economic')">ECONOMIC</div>
            <div class="panel-tab" onclick="switchPanel('replay')">REPLAY</div>
        </div>
        <div class="panel-content" id="panelContent">
            <!-- Drawings Panel -->
            <div id="drawings-panel">
                <div class="toolbar-group" style="margin-bottom: 10px;">
                    <button class="tool-btn" onclick="activateTool('cursor')"><i class="fa-regular fa-hand"></i></button>
                    <button class="tool-btn" onclick="activateTool('line')"><i class="fa-solid fa-slash"></i></button>
                    <button class="tool-btn" onclick="activateTool('ray')"><i class="fa-solid fa-arrow-right"></i></button>
                    <button class="tool-btn" onclick="activateTool('hline')"><i class="fa-solid fa-minus"></i></button>
                    <button class="tool-btn" onclick="activateTool('trend')"><i class="fa-solid fa-chart-line"></i></button>
                    <button class="tool-btn" onclick="activateTool('fib')"><i class="fa-solid fa-ruler"></i></button>
                </div>
                <div id="savedDrawings"></div>
                <button class="tool-btn" onclick="saveDrawings()" style="width:100%; margin-top:10px;">💾 SAVE DRAWINGS</button>
                <button class="tool-btn" onclick="loadDrawings()" style="width:100%;">📂 LOAD DRAWINGS</button>
            </div>
        </div>
    </div>
</div>

<!-- Alert Modal -->
<div class="modal" id="alertModal">
    <h3>CREATE ALERT</h3>
    <input type="number" id="alertPrice" placeholder="Price">
    <select id="alertCondition">
        <option>ABOVE</option>
        <option>BELOW</option>
    </select>
    <button class="tool-btn" onclick="saveAlert()">CREATE</button>
    <button class="tool-btn" onclick="closeModal()">CANCEL</button>
</div>

<script>
    // ==================== FULL TRADINGVIEW IMPLEMENTATION ====================
    
    // Chart instances
    let mainChart, candleSeries, lineSeries, volumeSeries;
    let currentSymbol = 'XAUUSD';
    let currentInterval = '15';
    let chartType = 'candle';
    let activeIndicators = [];
    let drawings = [];
    let currentTool = 'cursor';
    let alerts = JSON.parse(localStorage.getItem('tv_alerts') || '[]');
    
    // ========== INITIALIZE CHART ==========
    function initChart() {
        mainChart = LightweightCharts.createChart(document.getElementById('mainChart'), {
            layout: {
                background: { color: '#050b14' },
                textColor: '#d0e5ff',
                fontSize: 12,
                fontFamily: 'Inter, sans-serif',
            },
            grid: {
                vertLines: { color: 'rgba(60, 100, 200, 0.2)' },
                horzLines: { color: 'rgba(60, 100, 200, 0.2)' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
                vertLine: { color: '#6a9eff', width: 1, style: 1 },
                horzLine: { color: '#6a9eff', width: 1, style: 1 },
            },
            rightPriceScale: {
                borderColor: '#3b6190',
                textColor: '#a0c0f0',
            },
            timeScale: {
                borderColor: '#3b6190',
                timeVisible: true,
                secondsVisible: false,
            },
        });
        
        candleSeries = mainChart.addCandlestickSeries({
            upColor: '#4ade80',
            downColor: '#ff6b6b',
            borderVisible: false,
            wickUpColor: '#4ade80',
            wickDownColor: '#ff6b6b',
        });
        
        volumeSeries = mainChart.addHistogramSeries({
            color: '#3b9eff',
            priceFormat: { type: 'volume' },
            priceScaleId: '',
            scaleMargins: { top: 0.8, bottom: 0 },
        });
        
        loadChartData();
    }
    
    // ========== DATA GENERATION (simulated real data) ==========
    function generateData(symbol, interval, count = 300) {
        const data = [];
        const volumes = [];
        let basePrice = symbol === 'XAUUSD' ? 2342 : 
                       symbol === 'BTCUSD' ? 67250 :
                       symbol === 'ETHUSD' ? 3421 : 175.34;
        let volatility = symbol === 'XAUUSD' ? 2.5 :
                        symbol === 'BTCUSD' ? 250 :
                        symbol === 'ETHUSD' ? 15 : 0.8;
        
        let time = Math.floor(Date.now() / 1000) - (count * 60 * (parseInt(interval) || 15));
        let trend = 1.0;
        
        for (let i = 0; i < count; i++) {
            // trend patterns
            if (i > 100 && i < 130) trend = 1.15;
            else if (i > 150 && i < 180) trend = 0.85;
            else trend = 1.0;
            
            let open = basePrice + (Math.random() - 0.5) * volatility;
            let close = open + (Math.random() - 0.4 + (trend-1)) * volatility;
            let high = Math.max(open, close) + Math.random() * volatility * 0.4;
            let low = Math.min(open, close) - Math.random() * volatility * 0.4;
            
            data.push({
                time: time + i * 60 * (parseInt(interval) || 15),
                open: parseFloat(open.toFixed(2)),
                high: parseFloat(high.toFixed(2)),
                low: parseFloat(low.toFixed(2)),
                close: parseFloat(close.toFixed(2)),
            });
            
            volumes.push({
                time: time + i * 60 * (parseInt(interval) || 15),
                value: Math.floor(Math.random() * 5000 + 1000),
                color: close >= open ? '#4ade8040' : '#ff6b6b40',
            });
            
            basePrice = close;
        }
        
        return { data, volumes };
    }
    
    function loadChartData() {
        const { data, volumes } = generateData(currentSymbol, currentInterval);
        candleSeries.setData(data);
        volumeSeries.setData(volumes);
        
        // update indicators
        updateIndicators(data);
        mainChart.timeScale().fitContent();
    }
    
    // ========== INDICATORS ==========
    function updateIndicators(data) {
        const prices = data.map(d => d.close);
        
        activeIndicators.forEach(ind => {
            if (ind === 'rsi') {
                const rsi = technicalIndicators.RSI.calculate({ values: prices, period: 14 });
                addIndicatorSeries(rsi, 'RSI', '#ff6ec4');
            }
            if (ind === 'ma') {
                const ma = technicalIndicators.SMA.calculate({ values: prices, period: 20 });
                addIndicatorSeries(ma, 'MA20', '#4ade80');
            }
            if (ind === 'macd') {
                const macd = technicalIndicators.MACD.calculate({ 
                    values: prices, 
                    fastPeriod: 12, 
                    slowPeriod: 26, 
                    signalPeriod: 9 
                });
                // add MACD line
                const macdLine = macd.map((v, i) => ({ time: data[i+33]?.time, value: v.MACD }));
                addIndicatorSeries(macdLine, 'MACD', '#7873f5');
            }
        });
    }
    
    function addIndicatorSeries(data, name, color) {
        const series = mainChart.addLineSeries({
            color: color,
            lineWidth: 2,
            title: name,
            priceScaleId: 'right',
        });
        series.setData(data.filter(d => d.value));
    }
    
    window.toggleIndicator = function(indicator) {
        if (activeIndicators.includes(indicator)) {
            activeIndicators = activeIndicators.filter(i => i !== indicator);
        } else {
            activeIndicators.push(indicator);
        }
        loadChartData(); // refresh with new indicators
    };
    
    // ========== CHART TYPE ==========
    window.setChartType = function(type) {
        chartType = type;
        mainChart.removeSeries(candleSeries);
        
        if (type === 'candle') {
            candleSeries = mainChart.addCandlestickSeries({
                upColor: '#4ade80',
                downColor: '#ff6b6b',
                borderVisible: false,
            });
        } else if (type === 'line') {
            candleSeries = mainChart.addLineSeries({
                color: '#3b9eff',
                lineWidth: 2,
            });
        } else if (type === 'area') {
            candleSeries = mainChart.addAreaSeries({
                topColor: 'rgba(60, 150, 255, 0.4)',
                bottomColor: 'rgba(60, 150, 255, 0.0)',
                lineColor: '#3b9eff',
            });
        }
        
        loadChartData();
    };
    
    // ========== DRAWINGS ==========
    window.activateTool = function(tool) {
        currentTool = tool;
        // In real implementation, this would activate drawing mode
    };
    
    window.saveDrawings = function() {
        localStorage.setItem('tv_drawings', JSON.stringify(drawings));
        alert('Drawings saved!');
    };
    
    window.loadDrawings = function() {
        drawings = JSON.parse(localStorage.getItem('tv_drawings') || '[]');
        // redraw all saved drawings
    };
    
    // ========== ALERTS ==========
    window.showAlertModal = function() {
        document.getElementById('alertModal').classList.add('active');
    };
    
    window.saveAlert = function() {
        const price = document.getElementById('alertPrice').value;
        const condition = document.getElementById('alertCondition').value;
        
        alerts.push({
            symbol: currentSymbol,
            price: parseFloat(price),
            condition: condition,
            id: Date.now()
        });
        
        localStorage.setItem('tv_alerts', JSON.stringify(alerts));
        closeModal();
        
        // show in alerts panel
        updateAlertsPanel();
    };
    
    window.closeModal = function() {
        document.getElementById('alertModal').classList.remove('active');
    };
    
    // ========== EXPORT CHART ==========
    window.exportChart = function() {
        html2canvas(document.getElementById('mainChart')).then(canvas => {
            const link = document.createElement('a');
            link.download = `chart-${currentSymbol}-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    };
    
    // ========== REPLAY MODE ==========
    let replayData = [];
    let replayIndex = 0;
    let replayTimer = null;
    
    window.startReplay = function() {
        replayData = generateData(currentSymbol, currentInterval, 200).data;
        replayIndex = 0;
        
        if (replayTimer) clearInterval(replayTimer);
        replayTimer = setInterval(() => {
            if (replayIndex < replayData.length) {
                candleSeries.setData(replayData.slice(0, replayIndex + 1));
                replayIndex++;
            } else {
                clearInterval(replayTimer);
            }
        }, 200);
    };
    
    // ========== SAVE/LOAD LAYOUT ==========
    window.saveLayout = function() {
        const layout = {
            symbol: currentSymbol,
            interval: currentInterval,
            indicators: activeIndicators,
            drawings: drawings
        };
        localStorage.setItem('tv_layout', JSON.stringify(layout));
        alert('Layout saved!');
    };
    
    window.loadLayout = function() {
        const layout = JSON.parse(localStorage.getItem('tv_layout') || '{}');
        if (layout.symbol) changeSymbol(layout.symbol);
        if (layout.interval) changeInterval(layout.interval);
        if (layout.indicators) {
            activeIndicators = layout.indicators;
            loadChartData();
        }
    };
    
    // ========== SYMBOL CHANGE ==========
    window.changeSymbol = function(symbol) {
        currentSymbol = symbol;
        document.getElementById('currentSymbol').innerText = symbol;
        loadChartData();
    };
    
    window.changeInterval = function(interval) {
        currentInterval = interval;
        loadChartData();
    };
    
    // ========== PANEL SWITCHING ==========
    window.switchPanel = function(panel) {
        document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        
        const content = {
            drawings: '<div>DRAWINGS TOOLBOX</div>',
            alerts: '<div>' + alerts.map(a => `<div>${a.symbol} ${a.condition} ${a.price}</div>`).join('') + '</div>',
            news: '<div>FINANCIAL NEWS FEED</div>',
            economic: '<div>ECONOMIC CALENDAR</div>',
            replay: '<div><button class="tool-btn" onclick="startReplay()">START REPLAY</button></div>'
        };
        
        document.getElementById('panelContent').innerHTML = content[panel];
    };
    
    // ========== WATCHLIST PRICE UPDATES ==========
    setInterval(() => {
        // simulate price updates
        document.getElementById('xau-price').innerText = (2342 + (Math.random()-0.5)*5).toFixed(2);
        document.getElementById('btc-price').innerText = (67250 + (Math.random()-0.5)*300).toFixed(0);
        
        // check alerts
        checkAlerts();
    }, 3000);
    
    function checkAlerts() {
        // in real implementation, check current price against alerts
    }
    
    // ========== INITIALIZE ==========
    window.onload = function() {
        initChart();
        
        // load saved drawings if any
        drawings = JSON.parse(localStorage.getItem('tv_drawings') || '[]');
        
        // setup keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveLayout();
            }
        });
    };
</script>
</body>
</html>
