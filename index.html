<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD - 30 - FOREX.com · Premium TradingView</title>
    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <!-- Technical Indicators -->
    <script src="https://cdn.jsdelivr.net/npm/technicalindicators@3.1.0/dist/technicalindicators.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Monaco', 'Courier New', monospace;
        }

        body {
            background: #0d1117;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Main TradingView Container */
        .tradingview {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: #0d1117;
            color: #d0d4d9;
        }

        /* ========== TOP NAVIGATION ========== */
        .top-nav {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            background: #131722;
            border-bottom: 1px solid #2a2e39;
            height: 48px;
            gap: 16px;
        }

        .tradingview-logo {
            color: #2962ff;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .symbol-info {
            display: flex;
            align-items: center;
            background: #1e222d;
            border-radius: 4px;
            padding: 4px 8px;
            border-left: 2px solid #2962ff;
        }

        .symbol-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
        }

        .symbol-interval {
            color: #5d6b7a;
            margin: 0 4px;
        }

        .broker-name {
            background: #2a2e39;
            padding: 2px 6px;
            border-radius: 2px;
            font-size: 0.8rem;
            color: #b0b7c0;
        }

        /* Date Range Selector - Exactly like screenshot: 1D, 5D, 1M, 3M, 6M, YTD, 1Y, 5Y, All */
        .date-range {
            display: flex;
            background: #1e222d;
            border-radius: 4px;
            padding: 2px;
            margin-left: 20px;
        }

        .range-item {
            padding: 4px 12px;
            font-size: 0.8rem;
            color: #8a9199;
            cursor: pointer;
            border-radius: 3px;
        }

        .range-item:hover {
            background: #2a2e39;
            color: white;
        }

        .range-item.active {
            background: #2962ff;
            color: white;
        }

        /* ========== MAIN LAYOUT ========== */
        .main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Toolbar */
        .left-toolbar {
            width: 48px;
            background: #131722;
            border-right: 1px solid #2a2e39;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
        }

        .tool-icon {
            width: 48px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a9199;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .tool-icon:hover {
            color: #2962ff;
            background: #1e222d;
        }

        .tool-icon.active {
            color: #2962ff;
            border-left: 3px solid #2962ff;
        }

        /* Center Chart Section */
        .chart-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1117;
        }

        /* Chart Toolbar */
        .chart-toolbar {
            display: flex;
            align-items: center;
            padding: 4px 12px;
            background: #131722;
            border-bottom: 1px solid #2a2e39;
            height: 40px;
            gap: 16px;
        }

        /* Timeframe selector - exactly like screenshot */
        .timeframe-selector {
            display: flex;
            background: #1e222d;
            border-radius: 4px;
            padding: 2px;
        }

        .tf-item {
            padding: 4px 12px;
            font-size: 0.8rem;
            color: #8a9199;
            cursor: pointer;
            border-radius: 3px;
        }

        .tf-item:hover {
            background: #2a2e39;
            color: white;
        }

        .tf-item.active {
            background: #2962ff;
            color: white;
        }

        /* Red and Blue bars from screenshot */
        .indicator-bars {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .red-bar {
            width: 16px;
            height: 24px;
            background: linear-gradient(180deg, #ff4d4d, #b30000);
            border-radius: 2px;
        }

        .blue-bar {
            width: 16px;
            height: 24px;
            background: linear-gradient(180deg, #4d88ff, #0033cc);
            border-radius: 2px;
        }

        /* Chart Container */
        .chart-wrapper {
            flex: 1;
            position: relative;
            padding: 8px;
        }

        #tv_chart {
            width: 100%;
            height: 100%;
            background: #0d1117;
        }

        /* Time Axis - Exactly like screenshot: 09:00/19W, 18, 06:30/AM, etc */
        .time-axis {
            display: flex;
            justify-content: space-around;
            padding: 8px 16px;
            background: #131722;
            border-top: 1px solid #2a2e39;
            border-bottom: 1px solid #2a2e39;
            font-size: 0.7rem;
            color: #8a9199;
            font-family: 'Courier New', monospace;
        }

        .time-marker {
            text-align: center;
            min-width: 60px;
        }

        /* Right Panel - With price scale exactly like screenshot */
        .right-panel {
            width: 220px;
            background: #131722;
            border-left: 1px solid #2a2e39;
            display: flex;
            flex-direction: column;
        }

        /* Price Scale - 3.50E+00 down to 0.00E+00 */
        .price-scale {
            padding: 16px 8px;
            font-family: 'Courier New', monospace;
            border-bottom: 1px solid #2a2e39;
        }

        .price-level {
            display: flex;
            justify-content: flex-end;
            padding: 3px 0;
            font-size: 0.75rem;
            color: #8a9199;
            border-bottom: 1px dotted #2a2e39;
        }

        .price-level.main {
            color: #ffd700;
            font-weight: 600;
            background: rgba(255, 215, 0, 0.1);
        }

        /* Right side indicators - exact match */
        .indicator-side {
            flex: 1;
            padding: 16px 8px;
            font-family: 'Courier New', monospace;
            overflow-y: auto;
        }

        .indicator-level {
            display: flex;
            justify-content: flex-end;
            padding: 3px 0;
            font-size: 0.75rem;
            color: #b4b9c2;
            border-bottom: 1px dotted #2a2e39;
        }

        .indicator-level.highlight {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.05);
        }

        /* Bottom Status Bar - Exactly like screenshot */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 16px;
            background: #131722;
            border-top: 1px solid #2a2e39;
            height: 32px;
            font-size: 0.7rem;
            color: #8a9199;
        }

        .tradingview-credit {
            color: #2962ff;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .utc-time {
            font-family: 'Courier New', monospace;
        }

        /* Context menu for right panel */
        .context-menu {
            position: absolute;
            background: #1e222d;
            border: 1px solid #2a2e39;
            border-radius: 4px;
            padding: 4px 0;
            display: none;
        }

        .context-menu-item {
            padding: 6px 24px;
            font-size: 0.8rem;
            color: #d0d4d9;
            cursor: pointer;
        }

        .context-menu-item:hover {
            background: #2962ff;
        }
    </style>
</head>
<body>
    <div class="tradingview">
        <!-- TOP NAVIGATION - Exactly as screenshot -->
        <div class="top-nav">
            <div class="tradingview-logo">
                <i class="fa-brands fa-trade-federation"></i> TradingView
            </div>
            
            <!-- Symbol Info: XAUUSD - 30 - FOREX.com -->
            <div class="symbol-info">
                <span class="symbol-name">XAUUSD</span>
                <span class="symbol-interval">- 30 -</span>
                <span class="broker-name">FOREX.com</span>
            </div>

            <!-- Date Range: 1D, 5D, 1M, 3M, 6M, YTD, 1Y, 5Y, All -->
            <div class="date-range">
                <span class="range-item">1D</span>
                <span class="range-item">5D</span>
                <span class="range-item active">1M</span>
                <span class="range-item">3M</span>
                <span class="range-item">6M</span>
                <span class="range-item">YTD</span>
                <span class="range-item">1Y</span>
                <span class="range-item">5Y</span>
                <span class="range-item">All</span>
            </div>
            
            <div style="flex:1"></div>
            
            <!-- User settings icons -->
            <div style="display: flex; gap: 16px;">
                <i class="fa-regular fa-bell"></i>
                <i class="fa-regular fa-circle-question"></i>
                <i class="fa-regular fa-user"></i>
            </div>
        </div>

        <!-- MAIN AREA -->
        <div class="main-area">
            <!-- LEFT TOOLBAR -->
            <div class="left-toolbar">
                <div class="tool-icon active"><i class="fa-regular fa-chart-line"></i></div>
                <div class="tool-icon"><i class="fa-regular fa-pen-to-square"></i></div>
                <div class="tool-icon"><i class="fa-regular fa-hand"></i></div>
                <div class="tool-icon"><i class="fa-regular fa-crosshair"></i></div>
                <div class="tool-icon"><i class="fa-regular fa-circle"></i></div>
                <div class="tool-icon"><i class="fa-regular fa-square"></i></div>
                <div class="tool-icon"><i class="fa-regular fa-arrow-right"></i></div>
                <div class="tool-icon"><i class="fa-regular fa-ruler"></i></div>
                <div class="tool-icon"><i class="fa-regular fa-font"></i></div>
                <div class="tool-icon"><i class="fa-regular fa-note-sticky"></i></div>
                <div class="tool-icon"><i class="fa-regular fa-clock"></i></div>
            </div>

            <!-- CHART SECTION -->
            <div class="chart-section">
                <!-- Chart Toolbar with timeframe and indicators -->
                <div class="chart-toolbar">
                    <!-- Timeframe selector -->
                    <div class="timeframe-selector">
                        <span class="tf-item">1</span>
                        <span class="tf-item">5</span>
                        <span class="tf-item active">30</span>
                        <span class="tf-item">60</span>
                        <span class="tf-item">240</span>
                        <span class="tf-item">1D</span>
                    </div>

                    <!-- Red and Blue bars from screenshot -->
                    <div class="indicator-bars">
                        <div class="red-bar"></div>
                        <div class="blue-bar"></div>
                        <span style="color: #8a9199; font-size: 0.8rem;">Indicators</span>
                    </div>

                    <!-- Chart type selector -->
                    <div style="display: flex; gap: 8px;">
                        <i class="fa-regular fa-candle"></i>
                        <i class="fa-regular fa-chart-line"></i>
                        <i class="fa-regular fa-chart-bar"></i>
                    </div>
                </div>

                <!-- MAIN CHART -->
                <div class="chart-wrapper">
                    <div id="tv_chart"></div>
                </div>

                <!-- TIME AXIS - Exactly as screenshot -->
                <div class="time-axis">
                    <span class="time-marker">09:00/19W</span>
                    <span class="time-marker">18</span>
                    <span class="time-marker">06:30/AM</span>
                    <span class="time-marker">09:30/AM</span>
                    <span class="time-marker">12:30/PM</span>
                    <span class="time-marker">03:00/PM</span>
                    <span class="time-marker">06:00/PM</span>
                    <span class="time-marker">09:00/PM</span>
                    <span class="time-marker">12:00/PM</span>
                </div>
            </div>

            <!-- RIGHT PANEL - With price scale exactly like screenshot -->
            <div class="right-panel">
                <!-- Price scale: 3.50E+00 down to 0.00E+00 -->
                <div class="price-scale" id="priceScale">
                    <!-- Will be populated by JavaScript -->
                </div>

                <!-- Right side indicators: 3.50E+00 list -->
                <div class="indicator-side" id="indicatorSide">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
        </div>

        <!-- BOTTOM BAR - TradingView credit and UTC time -->
        <div class="bottom-bar">
            <div class="tradingview-credit">
                <i class="fa-brands fa-trade-federation"></i> TradingView
            </div>
            <div class="utc-time" id="utcTime">08:46:30 PM UTC+3</div>
        </div>
    </div>

    <!-- Context Menu for right panel -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item">Create Alert</div>
        <div class="context-menu-item">Add to Watchlist</div>
        <div class="context-menu-item">Set as Default</div>
    </div>

    <script>
        // ========== FULL TRADINGVIEW IMPLEMENTATION ==========
        
        // Chart variables
        let chart, candleSeries, volumeSeries;
        let chartData = [];
        let currentPrice = 2342.50;
        
        // Initialize chart
        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('tv_chart'), {
                layout: {
                    background: { color: '#0d1117' },
                    textColor: '#d0d4d9',
                    fontSize: 10,
                    fontFamily: 'Monaco, Courier New, monospace',
                },
                grid: {
                    vertLines: { color: '#1e222d' },
                    horzLines: { color: '#1e222d' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                    vertLine: { color: '#2962ff', width: 1, style: 1 },
                    horzLine: { color: '#2962ff', width: 1, style: 1 },
                },
                rightPriceScale: {
                    borderColor: '#2a2e39',
                    textColor: '#8a9199',
                    entireTextOnly: true,
                    visible: false, // Hide default scale, we use custom
                },
                timeScale: {
                    borderColor: '#2a2e39',
                    timeVisible: true,
                    secondsVisible: false,
                    tickMarkFormatter: (time) => {
                        const date = new Date(time * 1000);
                        return date.getHours() + ':' + ('0' + date.getMinutes()).slice(-2);
                    },
                },
            });

            // Create candlestick series
            candleSeries = chart.addCandlestickSeries({
                upColor: '#4ade80',
                downColor: '#ff4d4d',
                borderVisible: false,
                wickUpColor: '#4ade80',
                wickDownColor: '#ff4d4d',
                borderColor: '#2962ff',
            });

            // Volume series
            volumeSeries = chart.addHistogramSeries({
                color: '#4d88ff',
                priceFormat: { type: 'volume' },
                priceScaleId: '',
                scaleMargins: { top: 0.8, bottom: 0 },
            });

            // Generate initial data
            generateData();
            
            // Update price scales
            updatePriceScales();
        }

        // Generate realistic XAUUSD 30-minute data
        function generateData() {
            chartData = [];
            let basePrice = 2342.50;
            let time = Math.floor(Date.now() / 1000) - (200 * 1800); // 30-min candles
            
            for (let i = 0; i < 200; i++) {
                // Create realistic patterns
                let trend = 1.0;
                if (i > 50 && i < 70) trend = 1.15; // Uptrend
                if (i > 90 && i < 110) trend = 0.85; // Downtrend
                if (i > 130 && i < 150) trend = 1.2; // Strong uptrend
                
                let open = basePrice + (Math.random() - 0.5) * 2.5;
                let close = open + (Math.random() - 0.4 + (trend-1)) * 2.5;
                let high = Math.max(open, close) + Math.random() * 1.5;
                let low = Math.min(open, close) - Math.random() * 1.5;
                
                chartData.push({
                    time: time + i * 1800,
                    open: parseFloat(open.toFixed(2)),
                    high: parseFloat(high.toFixed(2)),
                    low: parseFloat(low.toFixed(2)),
                    close: parseFloat(close.toFixed(2)),
                });
                
                basePrice = close;
            }
            
            // Set data
            candleSeries.setData(chartData);
            
            // Volume data
            const volumeData = chartData.map(candle => ({
                time: candle.time,
                value: Math.floor(Math.random() * 5000 + 1000),
                color: candle.close >= candle.open ? 'rgba(74, 222, 128, 0.5)' : 'rgba(255, 77, 77, 0.5)',
            }));
            
            volumeSeries.setData(volumeData);
            
            // Fit chart
            chart.timeScale().fitContent();
        }

        // Update price scales (3.50E+00 format)
        function updatePriceScales() {
            if (!chartData.length) return;
            
            const lastCandle = chartData[chartData.length - 1];
            const high = Math.max(...chartData.slice(-30).map(d => d.high));
            const low = Math.min(...chartData.slice(-30).map(d => d.low));
            const range = high - low;
            const step = range / 14;
            
            let priceHtml = '';
            let indicatorHtml = '';
            
            // Generate from high to low
            for (let i = 14; i >= 0; i--) {
                let price = low + (i * step);
                let priceFormatted = price.toExponential(2).replace('e+', 'E+');
                
                // Check if this is near current price
                let isCurrent = Math.abs(price - lastCandle.close) < step/2;
                
                priceHtml += `<div class="price-level ${isCurrent ? 'main' : ''}">${priceFormatted}</div>`;
                indicatorHtml += `<div class="indicator-level ${isCurrent ? 'highlight' : ''}">${priceFormatted}</div>`;
            }
            
            document.getElementById('priceScale').innerHTML = priceHtml;
            document.getElementById('indicatorSide').innerHTML = indicatorHtml;
        }

        // Real-time updates
        function updateRealTime() {
            if (!chartData.length) return;
            
            const lastCandle = chartData[chartData.length - 1];
            const newTime = lastCandle.time + 1800;
            const newClose = lastCandle.close + (Math.random() - 0.5) * 3;
            
            const newCandle = {
                time: newTime,
                open: lastCandle.close,
                high: Math.max(lastCandle.close, newClose) + Math.random(),
                low: Math.min(lastCandle.close, newClose) - Math.random(),
                close: newClose,
            };
            
            // Update chart
            chartData.push(newCandle);
            chartData.shift();
            candleSeries.update(newCandle);
            
            // Update volume
            volumeSeries.update({
                time: newTime,
                value: Math.floor(Math.random() * 5000 + 1000),
                color: newClose >= newCandle.open ? 'rgba(74, 222, 128, 0.5)' : 'rgba(255, 77, 77, 0.5)',
            });
            
            // Update price scales
            updatePriceScales();
            
            // Update current price
            currentPrice = newClose;
            
            // Update UTC time
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const formattedHours = hours % 12 || 12;
            
            document.getElementById('utcTime').innerHTML = 
                `${formattedHours}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')} ${ampm} UTC+3`;
        }

        // Handle timeframe changes
        document.querySelectorAll('.tf-item').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tf-item').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                // In real implementation: change chart interval
                generateData();
            });
        });

        // Handle date range changes
        document.querySelectorAll('.range-item').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.range-item').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                // In real implementation: load different date range
            });
        });

        // Handle tool clicks
        document.querySelectorAll('.tool-icon').forEach(tool => {
            tool.addEventListener('click', function() {
                document.querySelectorAll('.tool-icon').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Right-click context menu on price scale
        document.querySelectorAll('.price-level, .indicator-level').forEach(el => {
            el.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                const menu = document.getElementById('contextMenu');
                menu.style.display = 'block';
                menu.style.left = e.pageX + 'px';
                menu.style.top = e.pageY + 'px';
                
                // Hide menu when clicking elsewhere
                setTimeout(() => {
                    document.addEventListener('click', function hideMenu() {
                        menu.style.display = 'none';
                        document.removeEventListener('click', hideMenu);
                    });
                }, 100);
            });
        });

        // Initialize everything
        window.onload = function() {
            initChart();
            
            // Real-time updates every 3 seconds
            setInterval(updateRealTime, 3000);
            
            // Initial UTC time
            const now = new Date();
            document.getElementById('utcTime').innerHTML = 
                `${now.getHours()}:${now.getMinutes()}:${now.getSeconds()} PM UTC+3`;
        };
    </script>
</body>
