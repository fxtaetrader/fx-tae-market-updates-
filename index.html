<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Clone · Full Working Platform</title>
    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
        }
        
        body {
            background: #131722;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Top Header */
        .header {
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 24px;
            height: 48px;
        }
        
        .logo {
            color: #ffd700;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .symbol-picker {
            background: #2a2e39;
            padding: 6px 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .symbol-picker:hover {
            background: #3a3e49;
        }
        
        /* Main Layout */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* Left Toolbar */
        .left-toolbar {
            width: 48px;
            background: #1e222d;
            border-right: 1px solid #2a2e39;
            padding: 8px 0;
        }
        
        .tool-btn {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a9199;
            cursor: pointer;
        }
        
        .tool-btn:hover {
            color: #ffd700;
            background: #2a2e39;
        }
        
        .tool-btn.active {
            color: #ffd700;
            border-left: 3px solid #ffd700;
        }
        
        /* Chart Area */
        .chart-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #131722;
        }
        
        /* Timeframe Toolbar */
        .timeframe-bar {
            height: 40px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
        }
        
        .tf-group {
            display: flex;
            background: #2a2e39;
            border-radius: 4px;
            padding: 2px;
        }
        
        .tf-btn {
            padding: 4px 12px;
            font-size: 12px;
            color: #8a9199;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .tf-btn:hover {
            background: #3a3e49;
            color: white;
        }
        
        .tf-btn.active {
            background: #ffd700;
            color: #131722;
            font-weight: bold;
        }
        
        /* Chart Container */
        .chart-wrapper {
            flex: 1;
            position: relative;
            padding: 8px;
        }
        
        #chart {
            width: 100%;
            height: 100%;
        }
        
        /* Right Panel */
        .right-panel {
            width: 250px;
            background: #1e222d;
            border-left: 1px solid #2a2e39;
            padding: 16px;
            overflow-y: auto;
        }
        
        .price-scale {
            font-family: 'Courier New', monospace;
            color: #8a9199;
            font-size: 12px;
        }
        
        .price-row {
            display: flex;
            justify-content: flex-end;
            padding: 4px 0;
            border-bottom: 1px dotted #2a2e39;
        }
        
        .price-row.current {
            color: #ffd700;
            font-weight: bold;
        }
        
        /* Bottom Status Bar */
        .status-bar {
            height: 32px;
            background: #1e222d;
            border-top: 1px solid #2a2e39;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 12px;
            color: #8a9199;
            gap: 24px;
        }
        
        /* Indicators */
        .indicator {
            padding: 8px;
            margin: 8px 0;
            background: #2a2e39;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .indicator:hover {
            background: #3a3e49;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">📊 TRADINGVIEW</div>
            <div class="symbol-picker" id="symbolPicker">
                <span id="currentSymbol">XAUUSD</span>
                <span style="color: #ffd700;">▼</span>
            </div>
            <div style="color: #8a9199; font-size: 14px;">FOREX.com</div>
            <div style="flex:1"></div>
            <div style="display: flex; gap: 16px;">
                <span><i class="fa-regular fa-bell"></i></span>
                <span><i class="fa-regular fa-moon"></i></span>
                <span><i class="fa-regular fa-user"></i></span>
            </div>
        </div>
        
        <!-- MAIN CONTENT -->
        <div class="main">
            <!-- LEFT TOOLBAR -->
            <div class="left-toolbar">
                <div class="tool-btn active"><i class="fa-regular fa-chart-line"></i></div>
                <div class="tool-btn"><i class="fa-regular fa-pen-to-square"></i></div>
                <div class="tool-btn"><i class="fa-regular fa-hand"></i></div>
                <div class="tool-btn"><i class="fa-regular fa-crosshair"></i></div>
                <div class="tool-btn"><i class="fa-regular fa-circle"></i></div>
                <div class="tool-btn"><i class="fa-regular fa-ruler"></i></div>
                <div class="tool-btn"><i class="fa-regular fa-font"></i></div>
            </div>
            
            <!-- CHART AREA -->
            <div class="chart-area">
                <!-- TIMEFRAME BAR -->
                <div class="timeframe-bar">
                    <div class="tf-group">
                        <div class="tf-btn" onclick="changeTimeframe('1')">1</div>
                        <div class="tf-btn" onclick="changeTimeframe('5')">5</div>
                        <div class="tf-btn active" onclick="changeTimeframe('15')">15</div>
                        <div class="tf-btn" onclick="changeTimeframe('30')">30</div>
                        <div class="tf-btn" onclick="changeTimeframe('60')">60</div>
                        <div class="tf-btn" onclick="changeTimeframe('240')">240</div>
                        <div class="tf-btn" onclick="changeTimeframe('D')">D</div>
                        <div class="tf-btn" onclick="changeTimeframe('W')">W</div>
                        <div class="tf-btn" onclick="changeTimeframe('M')">M</div>
                    </div>
                    
                    <div class="tf-group">
                        <div class="tf-btn" onclick="setChartType('candle')">Candles</div>
                        <div class="tf-btn" onclick="setChartType('line')">Line</div>
                        <div class="tf-btn" onclick="setChartType('bar')">Bar</div>
                        <div class="tf-btn" onclick="setChartType('area')">Area</div>
                    </div>
                </div>
                
                <!-- CHART -->
                <div class="chart-wrapper">
                    <div id="chart"></div>
                </div>
            </div>
            
            <!-- RIGHT PANEL -->
            <div class="right-panel">
                <h4 style="color: white; margin-bottom: 16px;">INSTRUMENTS</h4>
                
                <!-- Watchlist -->
                <div class="indicator" onclick="changeSymbol('XAUUSD')">
                    <div style="display: flex; justify-content: space-between;">
                        <span>XAUUSD</span>
                        <span style="color: #4ade80;" id="xauPrice">2,342.50</span>
                    </div>
                </div>
                
                <div class="indicator" onclick="changeSymbol('BTCUSD')">
                    <div style="display: flex; justify-content: space-between;">
                        <span>BTCUSD</span>
                        <span style="color: #4ade80;" id="btcPrice">67,250.00</span>
                    </div>
                </div>
                
                <div class="indicator" onclick="changeSymbol('ETHUSD')">
                    <div style="display: flex; justify-content: space-between;">
                        <span>ETHUSD</span>
                        <span style="color: #ff6b6b;">3,421.00</span>
                    </div>
                </div>
                
                <div class="indicator" onclick="changeSymbol('AAPL')">
                    <div style="display: flex; justify-content: space-between;">
                        <span>AAPL</span>
                        <span style="color: #4ade80;">175.34</span>
                    </div>
                </div>
                
                <!-- Price Scale -->
                <h4 style="color: white; margin: 24px 0 16px;">PRICE SCALE</h4>
                <div class="price-scale" id="priceScale">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
        </div>
        
        <!-- STATUS BAR -->
        <div class="status-bar">
            <span><i class="fa-regular fa-clock"></i> <span id="liveTime">2025-03-18 14:30:45</span></span>
            <span><i class="fa-regular fa-chart-line"></i> 30m · Real-time</span>
            <span><i class="fa-regular fa-database"></i> 2342.50 / 2343.20</span>
            <span style="color: #ffd700;">⚡ Premium</span>
        </div>
    </div>

    <script>
        // ========== TRADINGVIEW FULL IMPLEMENTATION ==========
        
        // Chart variables
        let chart, mainSeries, volumeSeries;
        let currentSymbol = 'XAUUSD';
        let currentTimeframe = '15';
        let chartType = 'candle';
        let chartData = [];
        
        // Initialize chart
        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: {
                    background: { color: '#131722' },
                    textColor: '#d0d4d9',
                    fontSize: 11,
                    fontFamily: 'Monaco, monospace',
                },
                grid: {
                    vertLines: { color: '#1e222d' },
                    horzLines: { color: '#1e222d' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                    vertLine: { color: '#ffd700', width: 1, style: 1 },
                    horzLine: { color: '#ffd700', width: 1, style: 1 },
                },
                rightPriceScale: {
                    borderColor: '#2a2e39',
                    textColor: '#8a9199',
                    scaleMargins: { top: 0.1, bottom: 0.1 },
                },
                timeScale: {
                    borderColor: '#2a2e39',
                    timeVisible: true,
                    secondsVisible: false,
                },
            });
            
            // Create main series based on chart type
            createMainSeries();
            
            // Add volume series
            volumeSeries = chart.addHistogramSeries({
                color: '#4d88ff',
                priceFormat: { type: 'volume' },
                priceScaleId: '',
                scaleMargins: { top: 0.8, bottom: 0 },
            });
            
            // Load initial data
            loadData();
        }
        
        // Create main series based on chart type
        function createMainSeries() {
            if (mainSeries) {
                chart.removeSeries(mainSeries);
            }
            
            switch(chartType) {
                case 'candle':
                    mainSeries = chart.addCandlestickSeries({
                        upColor: '#4ade80',
                        downColor: '#ff6b6b',
                        borderVisible: false,
                        wickUpColor: '#4ade80',
                        wickDownColor: '#ff6b6b',
                        borderColor: '#ffd700',
                    });
                    break;
                case 'line':
                    mainSeries = chart.addLineSeries({
                        color: '#ffd700',
                        lineWidth: 2,
                    });
                    break;
                case 'bar':
                    mainSeries = chart.addBarSeries({
                        upColor: '#4ade80',
                        downColor: '#ff6b6b',
                    });
                    break;
                case 'area':
                    mainSeries = chart.addAreaSeries({
                        topColor: 'rgba(255, 215, 0, 0.3)',
                        bottomColor: 'rgba(255, 215, 0, 0.0)',
                        lineColor: '#ffd700',
                    });
                    break;
            }
        }
        
        // Generate realistic data
        function generateData(symbol, timeframe, count = 300) {
            const data = [];
            let basePrice = symbol === 'XAUUSD' ? 2342.50 :
                           symbol === 'BTCUSD' ? 67250 :
                           symbol === 'ETHUSD' ? 3421 : 175.34;
            
            let volatility = symbol === 'XAUUSD' ? 2.5 :
                            symbol === 'BTCUSD' ? 250 :
                            symbol === 'ETHUSD' ? 15 : 0.8;
            
            // Convert timeframe to seconds
            let tfSeconds = 60;
            if (timeframe === '1') tfSeconds = 60;
            else if (timeframe === '5') tfSeconds = 300;
            else if (timeframe === '15') tfSeconds = 900;
            else if (timeframe === '30') tfSeconds = 1800;
            else if (timeframe === '60') tfSeconds = 3600;
            else if (timeframe === '240') tfSeconds = 14400;
            else if (timeframe === 'D') tfSeconds = 86400;
            else if (timeframe === 'W') tfSeconds = 604800;
            else tfSeconds = 900;
            
            let time = Math.floor(Date.now() / 1000) - (count * tfSeconds);
            
            for (let i = 0; i < count; i++) {
                // Create realistic candlestick patterns
                let trend = 1.0;
                if (i > 100 && i < 130) trend = 1.15; // Uptrend
                else if (i > 150 && i < 180) trend = 0.85; // Downtrend
                
                let open = basePrice + (Math.random() - 0.5) * volatility;
                let close = open + (Math.random() - 0.4 + (trend-1)) * volatility;
                let high = Math.max(open, close) + Math.random() * volatility * 0.5;
                let low = Math.min(open, close) - Math.random() * volatility * 0.5;
                
                // Ensure realistic values
                high = Math.max(high, open, close) * 1.001;
                low = Math.min(low, open, close) * 0.999;
                
                data.push({
                    time: time + i * tfSeconds,
                    open: parseFloat(open.toFixed(2)),
                    high: parseFloat(high.toFixed(2)),
                    low: parseFloat(low.toFixed(2)),
                    close: parseFloat(close.toFixed(2)),
                });
                
                basePrice = close;
            }
            
            return data;
        }
        
        // Load data and update chart
        function loadData() {
            chartData = generateData(currentSymbol, currentTimeframe);
            
            if (chartType === 'candle' || chartType === 'bar') {
                mainSeries.setData(chartData);
            } else if (chartType === 'line') {
                const lineData = chartData.map(d => ({ time: d.time, value: d.close }));
                mainSeries.setData(lineData);
            } else if (chartType === 'area') {
                const areaData = chartData.map(d => ({ time: d.time, value: d.close }));
                mainSeries.setData(areaData);
            }
            
            // Volume data
            const volumeData = chartData.map(d => ({
                time: d.time,
                value: Math.floor(Math.random() * 5000 + 1000),
                color: d.close >= d.open ? 'rgba(74, 222, 128, 0.5)' : 'rgba(255, 107, 107, 0.5)',
            }));
            
            volumeSeries.setData(volumeData);
            
            // Update price scale
            updatePriceScale();
            
            // Fit chart to screen
            chart.timeScale().fitContent();
        }
        
        // Update price scale on right panel
        function updatePriceScale() {
            if (!chartData.length) return;
            
            const lastCandle = chartData[chartData.length - 1];
            const high = Math.max(...chartData.slice(-20).map(d => d.high));
            const low = Math.min(...chartData.slice(-20).map(d => d.low));
            const step = (high - low) / 14;
            
            let html = '';
            for (let i = 14; i >= 0; i--) {
                const price = (low + i * step).toFixed(2);
                const isCurrent = Math.abs(parseFloat(price) - lastCandle.close) < step/2;
                html += `<div class="price-row ${isCurrent ? 'current' : ''}">${price}</div>`;
            }
            
            document.getElementById('priceScale').innerHTML = html;
        }
        
        // Change timeframe
        window.changeTimeframe = function(tf) {
            currentTimeframe = tf;
            
            // Update active button
            document.querySelectorAll('.tf-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Reload data
            loadData();
        };
        
        // Change chart type
        window.setChartType = function(type) {
            chartType = type;
            createMainSeries();
            loadData();
        };
        
        // Change symbol
        window.changeSymbol = function(symbol) {
            currentSymbol = symbol;
            document.getElementById('currentSymbol').innerText = symbol;
            loadData();
            
            // Update active state in watchlist
            document.querySelectorAll('.indicator').forEach(ind => ind.style.background = '#2a2e39');
            event.currentTarget.style.background = '#3a3e49';
        };
        
        // Real-time updates
        function addRealTimeCandle() {
            if (!chartData.length) return;
            
            const lastCandle = chartData[chartData.length - 1];
            
            // Calculate next candle time based on timeframe
            let tfSeconds = 900; // default 15min
            if (currentTimeframe === '1') tfSeconds = 60;
            else if (currentTimeframe === '5') tfSeconds = 300;
            else if (currentTimeframe === '15') tfSeconds = 900;
            else if (currentTimeframe === '30') tfSeconds = 1800;
            else if (currentTimeframe === '60') tfSeconds = 3600;
            else if (currentTimeframe === '240') tfSeconds = 14400;
            
            const newTime = lastCandle.time + tfSeconds;
            const newClose = lastCandle.close + (Math.random() - 0.5) * 
                            (currentSymbol === 'XAUUSD' ? 2.5 : 250);
            
            const newCandle = {
                time: newTime,
                open: lastCandle.close,
                high: Math.max(lastCandle.close, newClose) + Math.random(),
                low: Math.min(lastCandle.close, newClose) - Math.random(),
                close: newClose,
            };
            
            // Add new candle
            chartData.push(newCandle);
            chartData.shift(); // Remove oldest to keep consistent
            
            // Update series based on chart type
            if (chartType === 'candle' || chartType === 'bar') {
                mainSeries.update(newCandle);
            } else {
                mainSeries.update({ time: newTime, value: newClose });
            }
            
            // Update volume
            volumeSeries.update({
                time: newTime,
                value: Math.floor(Math.random() * 5000 + 1000),
                color: newClose >= newCandle.open ? 'rgba(74, 222, 128, 0.5)' : 'rgba(255, 107, 107, 0.5)',
            });
            
            // Update price scale
            updatePriceScale();
            
            // Update watchlist prices
            document.getElementById('xauPrice').innerText = 
                (2342 + (Math.random()-0.5)*5).toFixed(2);
            document.getElementById('btcPrice').innerText = 
                (67250 + (Math.random()-0.5)*300).toFixed(0);
            
            // Update time in status bar
            const now = new Date();
            document.getElementById('liveTime').innerText = 
                now.toISOString().slice(0,10) + ' ' + 
                now.getHours().toString().padStart(2,'0') + ':' +
                now.getMinutes().toString().padStart(2,'0') + ':' +
                now.getSeconds().toString().padStart(2,'0');
        }
        
        // Initialize everything
        window.onload = function() {
            initChart();
            
            // Real-time updates every 3 seconds
            setInterval(addRealTimeCandle, 3000);
            
            // Symbol picker functionality
            document.getElementById('symbolPicker').addEventListener('click', function() {
                const symbols = ['XAUUSD', 'BTCUSD', 'ETHUSD', 'AAPL', 'GOOGL', 'MSFT'];
                const current = document.getElementById('currentSymbol').innerText;
                let next = symbols[(symbols.indexOf(current) + 1) % symbols.length];
                changeSymbol(next);
            });
        };
    </script>
</body>
</html>
